kind = "web"
previewPath = "/"
title = "FinEdge"
version = "1.0.0"
id = "artifacts/finedge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19479

[services.development]
run = "pnpm --filter @workspace/finedge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finedge", "run", "build" ]
publicDir = "artifacts/finedge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19479"
BASE_PATH = "/"
